name: Infrastructure Hardening - API Route Testing

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run daily at 6:00 AM UTC
    - cron: '0 6 * * *'

env:
  PRODUCTION_URL: https://audiojones.com
  ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}

jobs:
  route-testing:
    name: Critical Route Testing
    runs-on: ubuntu-latest
    # Skip when ADMIN_API_KEY isn't available (fork PRs, fresh repos) — the
    # curl-based tests would all 401 without it and produce noise.
    if: ${{ secrets.ADMIN_API_KEY != '' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Test Core Platform Routes
      run: |
        echo "🧪 Testing critical API routes..."

        # Test admin health endpoint
        curl -f -H "admin-key: $ADMIN_API_KEY" \
          "$PRODUCTION_URL/api/admin/health" || exit 1
        echo "✅ Admin health check passed"

        # Test admin stats endpoint
        curl -f -H "admin-key: $ADMIN_API_KEY" \
          "$PRODUCTION_URL/api/admin/stats" || exit 1
        echo "✅ Admin stats check passed"

        # Test webhook endpoint (HEAD request)
        curl -f -I "$PRODUCTION_URL/api/webhooks/whop" || exit 1
        echo "✅ Whop webhook endpoint accessible"

    - name: Test Post-MVP Automation Routes
      run: |
        echo "🤖 Testing automation system routes..."

        # Test analytics endpoint
        curl -f -H "admin-key: $ADMIN_API_KEY" \
          "$PRODUCTION_URL/api/admin/analytics/summary" || exit 1
        echo "✅ Analytics endpoint passed"

        # Test maintenance system endpoint
        curl -f -H "admin-key: $ADMIN_API_KEY" \
          "$PRODUCTION_URL/api/system/maintenance" || exit 1
        echo "✅ Maintenance system passed"

        # Test auto-alerts endpoint
        curl -f -H "admin-key: $ADMIN_API_KEY" \
          "$PRODUCTION_URL/api/admin/auto-alerts" || exit 1
        echo "✅ Auto-alerts system passed"

    - name: Test Client Portal Routes
      run: |
        echo "👥 Testing client portal routes..."

        # Test client billing portal (should require auth, expect 401/403/307)
        # 307 = redirect to login page, which is also valid auth protection
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          "$PRODUCTION_URL/api/client/billing/portal")
        if [[ "$response" == "401" || "$response" == "403" || "$response" == "307" ]]; then
          echo "✅ Client billing portal auth protection working (got $response)"
        else
          echo "❌ Client billing portal auth issue (got $response)"
          exit 1
        fi

    - name: Test Infrastructure Hardening Routes
      run: |
        echo "🔧 Testing infrastructure hardening routes..."

        # Test infrastructure status endpoint
        curl -f -H "admin-key: $ADMIN_API_KEY" \
          "$PRODUCTION_URL/api/admin/infrastructure" || exit 1
        echo "✅ Infrastructure endpoint passed"

    - name: Performance Baseline Testing
      run: |
        echo "⚡ Running performance baseline tests..."

        # Test response time for critical endpoints
        admin_health_time=$(curl -w "%{time_total}" -s -o /dev/null \
          -H "admin-key: $ADMIN_API_KEY" \
          "$PRODUCTION_URL/api/admin/health")

        echo "📊 Admin health response time: ${admin_health_time}s"

        # Fail if response time > 3 seconds
        if (( $(echo "$admin_health_time > 3.0" | bc -l) )); then
          echo "❌ Response time too slow: ${admin_health_time}s"
          exit 1
        fi

        echo "✅ Performance baseline passed"

    - name: Generate Test Report
      if: always()
      run: |
        echo "📋 Infrastructure Route Testing Report"
        echo "======================================"
        echo "Timestamp: $(date -u)"
        echo "Production URL: $PRODUCTION_URL"
        echo "Test Result: ${{ job.status }}"
        echo ""
        echo "Tested Routes:"
        echo "- /api/admin/health"
        echo "- /api/admin/stats"
        echo "- /api/webhooks/whop"
        echo "- /api/admin/analytics/summary"
        echo "- /api/system/maintenance"
        echo "- /api/admin/auto-alerts"
        echo "- /api/client/billing/portal"
        echo "- /api/admin/infrastructure"
        echo ""
        echo "Performance: Response times under 3s threshold"
        echo "Security: Authentication protection verified"

    - name: Notify on Failure
      if: failure()
      run: |
        echo "🚨 CRITICAL: Infrastructure route testing failed!"
        echo "This indicates potential production issues that need immediate attention."
        echo "Check the logs above for specific failing endpoints."
        exit 1

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: route-testing

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Enable Corepack
      run: corepack enable

    - name: Activate pnpm
      run: corepack prepare pnpm@10.30.3 --activate

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'pnpm'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Security Audit
      run: |
        echo "🔒 Running security audit (production dependencies)..."
        pnpm audit --audit-level high --prod
        echo "✅ Security audit completed"

    - name: Test Authentication Endpoints
      run: |
        echo "🛡️ Testing authentication security..."

        # Test admin routes without API key (should fail or redirect to auth)
        # 307 = redirect to login page, which is also valid auth protection
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          "$PRODUCTION_URL/api/admin/stats")
        if [[ "$response" == "401" || "$response" == "403" || "$response" == "307" ]]; then
          echo "✅ Admin routes properly protected (got $response)"
        else
          echo "❌ Admin route security issue (got $response)"
          exit 1
        fi

        # Test with invalid API key (should fail or redirect to auth)
        response=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "admin-key: invalid-key-test" \
          "$PRODUCTION_URL/api/admin/stats")
        if [[ "$response" == "401" || "$response" == "403" || "$response" == "307" ]]; then
          echo "✅ Invalid API key properly rejected (got $response)"
        else
          echo "❌ Invalid API key security issue (got $response)"
          exit 1
        fi

  deployment-verification:
    name: Deployment Verification
    runs-on: ubuntu-latest
    needs: [route-testing, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Verify Production Deployment
      run: |
        echo "🚀 Verifying production deployment..."

        # Wait for deployment to complete
        sleep 60

        # Verify all new automation systems are deployed
        endpoints=(
          "/api/admin/analytics/summary"
          "/api/system/maintenance"
          "/api/admin/auto-alerts"
          "/api/admin/infrastructure"
        )

        for endpoint in "${endpoints[@]}"; do
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "admin-key: $ADMIN_API_KEY" \
            "$PRODUCTION_URL$endpoint")
          if [[ "$response" == "200" ]]; then
            echo "✅ $endpoint deployed successfully"
          else
            echo "❌ $endpoint deployment issue (got $response)"
            exit 1
          fi
        done

        echo "🎉 All post-MVP automation systems successfully deployed!"
